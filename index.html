<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InkStream - 小说下载器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans SC', sans-serif;
        background: #000;
        background-image: 
          radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        background-attachment: fixed;
        color: #fff;
        overflow-x: hidden;
      }
      .font-serif {
        font-family: 'Noto Serif SC', serif;
      }
      
      /* Glassmorphism Utilities */
      .glass-panel {
        position: relative;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 0 0 20px rgba(99, 102, 241, 0.3);
        border-radius: 3rem;
      }

      /* Dynamic Island specific style */
      .glass-island {
        position: relative;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 8px 40px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(99, 102, 241, 0.3);
        border-radius: 2.5rem;
      }

      /* Fallback for browsers that don't support backdrop-filter */
      @supports not (backdrop-filter: blur(24px)) {
        .glass-panel {
          background: rgba(0, 0, 0, 0.7);
          box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 0 0 20px rgba(99, 102, 241, 0.3);
        }
      }

      .glass-panel::before {
        content: '';
        pointer-events: none;
        position: absolute;
        inset: -40%;
        background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.22), transparent 55%),
                    radial-gradient(circle at 70% 80%, rgba(180, 210, 255, 0.18), transparent 55%);
        opacity: 0.7;
        mix-blend-mode: screen;
        animation: fluidGlass 9s ease-in-out infinite;
      }

      @keyframes fluidGlass {
        0% { transform: translate(-12%, -12%) scale(1.05); }
        50% { transform: translate(12%, 12%) scale(1.05); }
        100% { transform: translate(-12%, -12%) scale(1.05); }
      }
      
      .glass-input {
        position: relative;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border-radius: 2rem;
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
      }

      /* Search box specific style */
      .search-box {
        position: relative;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border-radius: 2rem !important;
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
      }

      .search-box-glow {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(99, 102, 241, 0.5), rgba(168, 85, 247, 0.5), rgba(236, 72, 153, 0.5));
        filter: blur(20px);
        opacity: 0.2;
        border-radius: 2rem;
        pointer-events: none;
      }

      /* Fallback for browsers that don't support backdrop-filter */
      @supports not (backdrop-filter: blur(14px)) {
        .glass-input {
          background: rgba(0, 0, 0, 0.7);
          box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
      }

      .glass-input::before {
        content: '';
        pointer-events: none;
        position: absolute;
        inset: -30%;
        background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.18), transparent 55%),
                    radial-gradient(circle at 75% 75%, rgba(163, 148, 255, 0.14), transparent 55%);
        opacity: 0.7;
        mix-blend-mode: screen;
        animation: fluidGlass 8s ease-in-out infinite;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2); 
        border-radius: 10px;
      }

      /* Mobile-specific styles for small screens */
      @media (max-width: 768px) {
        .glass-panel {
          border-radius: 3rem !important;
          box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 0 0 20px rgba(99, 102, 241, 0.3) !important;
        }
        
        .glass-input {
          border-radius: 2rem !important;
          box-shadow: 0 0 20px rgba(99, 102, 241, 0.2) !important;
        }
        
        .glass-island {
          border-radius: 2.5rem !important;
          box-shadow: 0 8px 40px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(99, 102, 241, 0.3) !important;
        }
        
        .search-box {
          border-radius: 2rem !important;
          box-shadow: 0 0 20px rgba(99, 102, 241, 0.2) !important;
        }
        
        .search-box-glow {
          border-radius: 2rem !important;
        }
      }
    </style>
    <style>
      /* 3068 书源选择器动画喵~ */
      @keyframes source-circle-return {
        0% { left: 0px; transform: scale(1); }
        100% { left: calc(100% - 56px); transform: scale(1.1); }
      }
      @keyframes source-line-extend {
        0% { width: 0%; opacity: 0; }
        100% { width: 100%; opacity: 1; }
      }
      @keyframes source-panel-expand {
        0% { 
          opacity: 0; 
          transform: translateY(-16px) scale(0.98);
        }
        100% { 
          opacity: 1; 
          transform: translateY(0) scale(1);
        }
      }
      @keyframes source-item-fade-in {
        0% { 
          opacity: 0; 
          transform: translateY(12px);
        }
        100% { 
          opacity: 1; 
          transform: translateY(0);
        }
      }
      @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
        50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.8), 0 0 60px rgba(168, 85, 247, 0.4); }
      }
      @keyframes laser-shoot {
        0% { width: 0%; filter: brightness(1); }
        50% { filter: brightness(1.5); }
        100% { width: 100%; filter: brightness(1); }
      }
      @keyframes search-shrink {
        0% { transform: scaleX(1); border-radius: 2rem; }
        50% { transform: scaleX(0.5); border-radius: 3rem; }
        100% { transform: scaleX(0.08); border-radius: 50%; }
      }
      @keyframes search-expand {
        0% { transform: scaleX(0.08); border-radius: 50%; opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: scaleX(1); border-radius: 2rem; opacity: 1; }
      }
      .animate-source-circle-return { animation: source-circle-return 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
      .animate-source-line-extend { animation: source-line-extend 800ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }
      .animate-source-panel-expand { animation: source-panel-expand 700ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }
      .animate-glow-pulse { animation: glow-pulse 2s ease-in-out infinite; }
      .search-shrink { animation: search-shrink 700ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }
      .search-expand { animation: search-expand 800ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }

      /* Light Pillar Background (ReactBits Light Pillar inspired) */
      .light-pillar {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% 10%, rgba(82, 39, 255, 0.35), transparent 45%),
                    radial-gradient(circle at 50% 95%, rgba(255, 159, 252, 0.35), transparent 55%);
        mix-blend-mode: screen;
        opacity: 0.9;
        overflow: hidden;
      }

      .light-pillar::before {
        content: '';
        position: absolute;
        inset: -20%;
        background: linear-gradient(180deg, rgba(82, 39, 255, 0.65), rgba(255, 159, 252, 0.25) 45%, rgba(0, 0, 0, 0) 90%);
        filter: blur(88px);
        transform: rotate(25deg) translateX(-10%);
        animation: pillar-rotate 35s linear infinite;
      }

      .light-pillar::after {
        content: '';
        position: absolute;
        inset: -10%;
        background: radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.12), transparent 60%),
                    radial-gradient(circle at 50% 60%, rgba(255, 255, 255, 0.08), transparent 60%);
        filter: blur(32px);
        mix-blend-mode: screen;
        animation: pillar-flicker 6s ease-in-out infinite;
      }

      @keyframes pillar-rotate {
        0% { transform: rotate(25deg) translateX(-10%); }
        100% { transform: rotate(385deg) translateX(-10%); }
      }

      @keyframes pillar-flicker {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 0.5; }
      }
    </style>
